services:
  web:
    build: .
    # container_name: django_app
    # ports:
    #   - 8000:8000
    # volumes:
    #   - ./src:/app
    depends_on:
      db:
        condition: service_healthy
        restart: true
    env_file:
      - .env
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
  db:
    image: postgres:18
    volumes:
      - postgres_db:/var/lib/postgresql
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
  ngnix:
    image: nginx:stable-alpine
    ports:
      - 80:80
    volumes:
      - ./ngnix.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      web:
        condition: service_healthy
volumes:
  postgres_db:
